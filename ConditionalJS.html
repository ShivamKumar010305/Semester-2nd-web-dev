<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<script>>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Conditional statements in JavaScript are used to perform different actions based on whether a specified condition is true or false. This control flow is fundamental for decision-making within a program.
        //if condition
        //age validtion for vote casting!
        let age=23;
        if(age>=18){
            console.log(age + " is a validate age for vote casting");
        } 
        //if.....else...
        let myage=15;
        if(myage<18){
            console.log(" valid age");
        }
        else{
            console.log(" not valid age");
        }
        //switch case...
        let grade='g';
        switch(grade)
        {
            case 'A' :result ="First division";
            break;
            case 'B' :result ="Second division";
            break;
            case 'C' :result ="third division";
            break;
            default :result ="fail";

        }
        console.log(result);
        //if else if else.....
        let marks=22;
        if(marks>=60){
            console.log("First Division");
        }
        else if(marks<60 && marks>=40){
            console.log("Second division");

        }
        else if(marks<40 && marks>=33){
            console.log("Third division");
        }
        else{
            console.log("fail");
        }
        
    </script>
</body>
</html>
